{% extends "base.html" %}

{% block content %}
<a class="back" href="/">← 메인으로</a>

<section class="game-wrap">
  <div class="game-box">
    <h1>Infinite Choice</h1>
    <p class="desc" id="question">선택해주세요.</p>

    <div class="choice-list" id="choices">
      <button class="btn green">예</button>
      <button class="btn pink">아니오</button>
      <button class="btn blue">잘 모르겠음</button>
    </div>

    <div class="message" id="depth">선택 깊이: 0</div>
  </div>
</section>
{% endblock %}

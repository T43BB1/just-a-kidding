{% extends "base.html" %}

{% block content %}
<section class="hero">
  <h1>just a kidding :3</h1>
  <p>귀엽고 발랄하지만 어딘가 미묘하게 킹받는 미니게임 모음집입니다.</p>
  <div class="tiny">실제 오류가 아닙니다. 대부분 의도된 불편함입니다.</div>
</section>

<section class="grid">
  {% for game in games %}
  <a class="card" href="{{ game.url }}">
    <span class="num">{{ game.number }}</span>
    <h2>{{ game.title }}</h2>
    <p>{{ game.description }}</p>
    <span class="play">play →</span>
  </a>
  {% endfor %}
</section>
{% endblock %}
